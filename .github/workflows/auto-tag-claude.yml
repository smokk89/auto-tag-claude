name: Auto-tag Claude on Issues

on:
  issues:
    types: [opened]

jobs:
  tag-claude:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
      - name: Tag Claude on new issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '@claude-ai Please take a look at this issue.'
            })